<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>—</title>
<style>
/* Split-preview iframe for the easter-egg themes. Self-contained — does
   NOT load the real ezr-*.css (those target site-specific selectors).
   Captures the *aesthetic*: phosphor rain, terminal palette, two chat
   bubbles. ?theme=green (default) or ?theme=red switches palette. The
   "Show me" bubble is a real <button>; clicking it postMessages the
   parent gallery to apply the theme page-wide.                         */

:root {
  --void:           #000;
  --deep:           #030a03;
  --panel:          #061206;
  --phosphor:       #00ff41;
  --phosphor-bright:#39ff14;
  --phosphor-pale:  #c8ffc8;
  --phosphor-dim:   #00b32d;
  --phosphor-deep:  #003b00;
  --text:           #b8ffb8;
  --text-muted:     #5fa05f;
}
html[data-theme="red"] {
  --deep:           #080404;
  --panel:          #0d0606;
  --phosphor:       #c41e1e;
  --phosphor-bright:#ff3a1a;
  --phosphor-pale:  #e8a8a8;
  --phosphor-dim:   #7a0a0a;
  --phosphor-deep:  #2a0606;
  --text:           #d4a8a8;
  --text-muted:     #6a3838;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'Courier New', ui-monospace, monospace;
  overflow: hidden;
  position: relative;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 70% at 50% 40%, var(--deep) 0%, transparent 65%),
    radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, var(--void) 85%);
}

/* ─── Falling glyph rain (decorative; JS-generated columns) ─────────── */
.rain {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse 60% 65% at 50% 50%,
    rgba(0,0,0,0.25) 0%,
    rgba(0,0,0,0.7) 40%,
    rgba(0,0,0,1) 75%);
  -webkit-mask-image: radial-gradient(ellipse 60% 65% at 50% 50%,
    rgba(0,0,0,0.25) 0%,
    rgba(0,0,0,0.7) 40%,
    rgba(0,0,0,1) 75%);
}
/* Seamless-loop column: 200vh tall with top-half == bottom-half glyph
   stream. Translating by exactly 100vh per cycle produces a continuous
   waterfall with no visible reset. Per-column opacity is set in JS for
   dim-side variance. */
.col {
  position: absolute;
  top: -100vh;
  height: 200vh;
  width: 1ch;
  text-align: center;
  font-size: 14px;
  line-height: 1.3;
  color: var(--phosphor-dim);
  white-space: pre;
  opacity: 0.7;
  animation: fall linear infinite;
  text-shadow: 0 0 3px var(--phosphor);
  will-change: transform;
}
.col .head {
  color: var(--phosphor-bright);
  text-shadow:
    0 0 6px var(--phosphor-bright),
    0 0 12px var(--phosphor);
}
.col .mid { color: var(--phosphor); }
@keyframes fall {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(0, 100vh, 0); }
}

/* ─── Chat shell ──────────────────────────────────────────────────────
   Two bubbles: system left, user right (now a real <button>). Wider gap
   between them since the iframe is narrower than before — keeps the
   conversation from looking garbled. */
.shell {
  position: relative;
  z-index: 1;
  padding: 20px 22px 24px;
  display: flex;
  flex-direction: column;
  gap: 26px;
  font-size: 13px;
  line-height: 1.5;
  height: 100%;
  justify-content: flex-start;
}

.wordmark {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--phosphor);
  text-shadow: 0 0 4px var(--phosphor);
  opacity: 0.8;
  margin-bottom: 4px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  align-self: flex-start;
}
.wordmark::before {
  content: "▌";
  font-size: 11px;
  color: var(--phosphor-bright);
}

.bubble {
  position: relative;
  padding: 9px 13px 10px;
  background: var(--panel);
  border: 1px solid var(--phosphor-deep);
  border-radius: 3px;
  color: var(--phosphor-pale);
  text-shadow: 0 0 2px var(--phosphor-deep);
  max-width: 80%;
  font-family: 'Courier New', ui-monospace, monospace;
}
.bubble.system { align-self: flex-start; }
.bubble.user   { align-self: flex-end; }
.bubble .role {
  font-size: 8px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  display: block;
}

/* User bubble is a button — click to activate the page-wide theme.
   Sized to comfortably meet the 44px mobile tap-target guideline. */
button.bubble.user {
  font-family: 'Courier New', ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.5;
  text-align: left;
  cursor: pointer;
  background: linear-gradient(180deg, var(--panel), var(--void));
  border-color: var(--phosphor-dim);
  color: var(--phosphor);
  min-height: 44px;
  transition: box-shadow 180ms, border-color 180ms, color 180ms;
}
button.bubble.user:hover {
  border-color: var(--phosphor);
  box-shadow: 0 0 8px var(--phosphor-dim);
}
button.bubble.user:focus-visible {
  outline: 1px solid var(--phosphor-bright);
  outline-offset: 2px;
}
button.bubble.user.activated {
  border-color: var(--phosphor-bright);
  color: var(--phosphor-bright);
  box-shadow:
    0 0 14px var(--phosphor-bright),
    inset 0 0 10px var(--phosphor-deep);
}

/* Scanline + vignette overlays — CRT feel */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background-image: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0) 4px
  );
  mix-blend-mode: multiply;
}
.vignette {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background:
    radial-gradient(ellipse 120% 75% at 50% 50%, transparent 55%, rgba(0,0,0,0.75) 100%);
}
</style>
</head>
<body>

<div class="rain" id="rain"></div>

<div class="shell">
  <div class="wordmark" id="wordmark">prompt bar 1</div>

  <div class="bubble system">
    <span class="role">system</span>
    Follow the white rabbit
  </div>

  <button type="button" class="bubble user" id="showMeBtn" aria-pressed="false">
    <span class="role">user</span>
    Show me
  </button>
</div>

<div class="scanlines"></div>
<div class="vignette"></div>

<script>
  // ─── Theme + label ──────────────────────────────────────────────────
  const params  = new URLSearchParams(location.search);
  const theme   = params.get('theme') === 'red' ? 'red' : 'green';
  if (theme === 'red') document.documentElement.dataset.theme = 'red';
  document.getElementById('wordmark').textContent =
    'prompt bar ' + (theme === 'red' ? '2' : '1');

  // ─── "Show me" toggle ───────────────────────────────────────────────
  // Local active state, postMessaged to parent so the gallery can apply
  // the theme page-wide and ring this iframe.
  const btn = document.getElementById('showMeBtn');
  let activated = false;
  btn.addEventListener('click', () => {
    activated = !activated;
    btn.classList.toggle('activated', activated);
    btn.setAttribute('aria-pressed', String(activated));
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'ezr-toggle', theme, activated }, '*');
    }
  });

  // Parent tells us to deactivate when the other theme takes over.
  window.addEventListener('message', (e) => {
    if (!e.data || e.data.type !== 'ezr-deactivate') return;
    if (!activated) return;
    activated = false;
    btn.classList.remove('activated');
    btn.setAttribute('aria-pressed', 'false');
  });

  // ─── Glyph rain ─────────────────────────────────────────────────────
  // Seamless loop: build one iframe-viewport-height worth of glyphs
  // (top half) and duplicate (bottom half == top half). Translating
  // 100vh per cycle then has no visible seam. Per-column opacity adds
  // dim-side variance so the rain doesn't read as a uniform sheet.
  const GLYPHS = 'ﾋﾘｱｾﾜﾗﾇﾈﾏﾜﾓｴﾆﾃﾂﾐｼﾎｵﾖﾅﾑﾌｺｿﾅκλμπσχθαβγδ01:_>/';
  const rain = document.getElementById('rain');
  const colCount = 16;
  const colSpacing = 100 / colCount;
  const vh = Math.max(window.innerHeight, 200);
  for (let i = 0; i < colCount; i++) {
    const col = document.createElement('div');
    col.className = 'col';
    const xPct = i * colSpacing + (Math.random() - 0.5) * colSpacing * 0.6;
    col.style.left = `${xPct}%`;
    col.style.animationDuration = (9 + Math.random() * 13).toFixed(2) + 's';
    col.style.animationDelay   = (-Math.random() * 20).toFixed(2) + 's';
    const fontSize = 12 + Math.random() * 4;
    col.style.fontSize = fontSize.toFixed(1) + 'px';
    // Variance range [0.55, 0.70]: modest dim-side spread, max held at 0.70.
    col.style.opacity = (0.55 + Math.random() * 0.15).toFixed(2);

    const lineHeight = fontSize * 1.3;
    const perHalf = Math.ceil(vh / lineHeight) + 2;
    let half = '';
    for (let g = 0; g < perHalf; g++) {
      const ch = GLYPHS[(Math.random() * GLYPHS.length) | 0];
      if (g === 0)        half += `<span class="head">${ch}</span>\n`;
      else if (g < 4)     half += `<span class="mid">${ch}</span>\n`;
      else                half += ch + '\n';
    }
    col.innerHTML = half + half;
    rain.appendChild(col);
  }
</script>

</body>
</html>
