<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>—</title>
<style>
/* Split-preview iframe for the easter-egg themes. Self-contained — does
   NOT load the real ezr-*.css (those target site-specific selectors).
   Captures the *aesthetic*: phosphor rain, terminal palette, chat-shape
   bubbles. ?theme=green (default) or ?theme=red switches palette.       */

:root {
  --void:           #000;
  --deep:           #030a03;
  --panel:          #061206;
  --phosphor:       #00ff41;
  --phosphor-bright:#39ff14;
  --phosphor-pale:  #c8ffc8;
  --phosphor-dim:   #00b32d;
  --phosphor-deep:  #003b00;
  --text:           #b8ffb8;
  --text-muted:     #5fa05f;
  --amber:          #ffb000;
}
html[data-theme="red"] {
  --deep:           #080404;
  --panel:          #0d0606;
  --phosphor:       #c41e1e;
  --phosphor-bright:#ff3a1a;
  --phosphor-pale:  #e8a8a8;
  --phosphor-dim:   #7a0a0a;
  --phosphor-deep:  #2a0606;
  --text:           #d4a8a8;
  --text-muted:     #6a3838;
  --amber:          #ff5500;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'Courier New', ui-monospace, monospace;
  overflow: hidden;
  position: relative;
  min-height: 100vh;
  /* Top-left-anchored vignette so the chat (which sits top-left) has
     the brightest open ground around it. */
  background-image:
    radial-gradient(ellipse 60% 70% at 15% 28%, var(--deep) 0%, transparent 60%),
    radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, var(--void) 85%);
}

/* ─── Falling glyph rain ──────────────────────────────────────────────
   JS injects N .col elements at random x. Each is a stack of glyphs that
   translates downward across 3x viewport height, repeating. Two opacities
   per column for the head-vs-trail effect. */
.rain {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
  /* Pull the rain visually back from the chat bubbles. */
  mask-image: radial-gradient(ellipse 55% 60% at 50% 50%,
    rgba(0,0,0,0.2) 0%,
    rgba(0,0,0,0.7) 35%,
    rgba(0,0,0,1) 70%);
  -webkit-mask-image: radial-gradient(ellipse 55% 60% at 50% 50%,
    rgba(0,0,0,0.2) 0%,
    rgba(0,0,0,0.7) 35%,
    rgba(0,0,0,1) 70%);
}
.col {
  position: absolute;
  top: -120%;
  font-size: 15px;
  line-height: 1.25;
  letter-spacing: 0;
  color: var(--phosphor-dim);
  white-space: pre;
  text-align: center;
  width: 1ch;
  animation: fall linear infinite;
  text-shadow: 0 0 3px var(--phosphor);
  opacity: 0.75;
}
.col .head {
  color: var(--phosphor-bright);
  text-shadow:
    0 0 6px var(--phosphor-bright),
    0 0 12px var(--phosphor);
}
.col .mid {
  color: var(--phosphor);
}
@keyframes fall {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(0, 220%, 0); }
}

/* ─── Chat shell ──────────────────────────────────────────────────────
   No labels, no app name. Three short exchanges + a blinking cursor.
   Sits top-left to leave the rain visible on the right + bottom. */
.shell {
  position: relative;
  z-index: 1;
  padding: 22px 26px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 78%;
  font-size: 13.5px;
  line-height: 1.55;
}

.wordmark {
  font-size: 9px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--phosphor);
  text-shadow: 0 0 4px var(--phosphor);
  opacity: 0.75;
  margin-bottom: 6px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.wordmark::before {
  content: "▌";
  font-size: 11px;
  color: var(--phosphor-bright);
}

.bubble {
  position: relative;
  padding: 9px 13px 10px;
  background: var(--panel);
  border: 1px solid var(--phosphor-deep);
  border-radius: 3px;
  color: var(--phosphor-pale);
  text-shadow: 0 0 2px var(--phosphor-deep);
  max-width: 100%;
  font-family: 'Courier New', ui-monospace, monospace;
}
.bubble.user {
  align-self: flex-end;
  border-color: var(--phosphor-dim);
  background: linear-gradient(180deg, var(--panel), var(--void));
  color: var(--phosphor);
}
.bubble.me {
  align-self: flex-start;
}
.bubble .role {
  font-size: 8px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  display: block;
}

.cursor {
  display: inline-block;
  width: 7px;
  height: 13px;
  background: var(--phosphor-bright);
  margin-left: 3px;
  vertical-align: -2px;
  box-shadow: 0 0 5px var(--phosphor);
  animation: blink 1.1s steps(2) infinite;
}
@keyframes blink {
  to { opacity: 0; }
}

/* Scanline overlay — subtle CRT feel that ties both panels together. */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background-image: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0) 4px
  );
  mix-blend-mode: multiply;
}

/* Vertical color cast at very edges, like a worn monitor */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background:
    radial-gradient(ellipse 120% 75% at 50% 50%, transparent 55%, rgba(0,0,0,0.75) 100%);
}
</style>
</head>
<body>

<div class="rain" id="rain"></div>

<div class="shell">
  <div class="wordmark">session active</div>

  <div class="bubble me">
    <span class="role">user</span>
    where does this go
  </div>

  <div class="bubble user">
    <span class="role">system</span>
    somewhere specific
  </div>

  <div class="bubble me">
    <span class="role">user</span>
    show me<span class="cursor"></span>
  </div>
</div>

<div class="scanlines"></div>
<div class="vignette"></div>

<script>
  // Theme switch via ?theme=green|red
  const theme = new URLSearchParams(location.search).get('theme');
  if (theme === 'red') document.documentElement.dataset.theme = 'red';

  // Glyph rain — generate N columns at random x, varied speed + glyph
  // pool. Each column emits a 25-glyph stream so the loop is seamless.
  const GLYPHS = 'ﾋﾘｱｾﾜﾗﾇﾈﾏﾜﾓｴﾆﾃﾂﾐｼﾎｵﾖﾅﾑﾌｺｿﾅκλμπσχθαβγδ01:_>/';
  const rain = document.getElementById('rain');
  const colCount = 22;
  const colSpacing = 100 / colCount;
  for (let i = 0; i < colCount; i++) {
    const col = document.createElement('div');
    col.className = 'col';
    // x: jittered around the regular grid so it doesn't look striped
    const xPct = i * colSpacing + (Math.random() - 0.5) * colSpacing * 0.6;
    col.style.left = `${xPct}%`;
    // speed: 9 - 22s; size: 13 - 17px
    col.style.animationDuration = (9 + Math.random() * 13).toFixed(2) + 's';
    col.style.animationDelay   = (-Math.random() * 20).toFixed(2) + 's';
    col.style.fontSize = (13 + Math.random() * 4).toFixed(1) + 'px';
    // Build a 28-char glyph stream with a bright head, lit mids, dim trail
    let html = '';
    for (let g = 0; g < 28; g++) {
      const ch = GLYPHS[(Math.random() * GLYPHS.length) | 0];
      const lineBreak = g < 27 ? '\n' : '';
      if (g === 0)      html += `<span class="head">${ch}</span>${lineBreak}`;
      else if (g < 4)   html += `<span class="mid">${ch}</span>${lineBreak}`;
      else              html += ch + lineBreak;
    }
    col.innerHTML = html;
    rain.appendChild(col);
  }
</script>

</body>
</html>
