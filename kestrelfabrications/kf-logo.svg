<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Kestrel Fabrications wordmark - asymmetric clipped block echoing the
       fold-of-paper motif from the original CSS clip-path, with KF
       letterforms inside. Cobalt fill matches the page accent. -->
  <title>Kestrel Fabrications</title>
  <path d="M 0 0 L 64 0 L 64 44 L 44 64 L 0 64 Z" fill="oklch(46% 0.095 240)"/>
  <text x="32" y="42"
        text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="24"
        font-weight="700"
        letter-spacing="-1"
        fill="#ffffff">KF</text>
</svg>
