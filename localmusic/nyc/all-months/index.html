<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monthly Music — New York</title>
<style>
:root {
  --bg-canvas: oklch(25% 0.062 42);
  --bg-card:   oklch(28% 0.070 42);
  --border:    oklch(31% 0.070 42);
  --fg:        oklch(96% 0.03 42);
  --fg-muted:  oklch(82% 0.05 42);
  --ember:     oklch(76% 0.154 42);
  --ember-soft: oklch(82% 0.102 42);
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  margin: 0; min-height: 100vh; overflow-x: hidden;
  background: var(--bg-canvas); color: var(--fg);
  font: 400 16px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
}
.shell { max-width: 720px; margin: 0 auto; padding: 56px 22px 80px; }
.eyebrow {
  font: 500 11px/1 ui-monospace, "JetBrains Mono", monospace;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-muted);
}
.eyebrow a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; }
.eyebrow a:hover { color: var(--ember); }
h1 {
  font: 700 38px/1.1 Georgia, "Times New Roman", serif;
  margin: 14px 0 6px; color: var(--fg);
}
.lead { color: var(--fg-muted); margin: 0 0 36px; max-width: 56ch; }
.month-card {
  display: grid; gap: 4px;
  padding: 18px 20px;
  margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px;
  background: var(--bg-card); text-decoration: none; color: inherit;
  transition: border-color 160ms, transform 160ms;
}
.month-card:hover { border-color: var(--ember); transform: translateY(-1px); }
.month-card.current { border-color: var(--ember-soft); }
.month-label {
  font: 500 12px/1 ui-monospace, "JetBrains Mono", monospace;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ember-soft);
}
.month-label .dot { color: var(--ember); margin-left: 6px; }
.month-name { font-size: 18px; font-weight: 500; }
.month-go {
  font: 500 12px/1 ui-monospace, "JetBrains Mono", monospace;
  letter-spacing: 0.1em; color: var(--fg-muted); margin-top: 4px;
}
.empty { color: var(--fg-muted); }
@media (max-width: 540px) {
  .shell { padding: 36px 16px 56px; }
  h1 { font-size: 30px; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="eyebrow"><a href="/localmusic/nyc/rolling/">← Current month</a></div>
  <h1>Monthly Music</h1>
  <p class="lead">New York live-show companion. One playlist per month;
  every artist on a stage between now and ~90 days out.</p>
<p class="empty">No monthly playlists yet.</p>
</div>
</body>
</html>
