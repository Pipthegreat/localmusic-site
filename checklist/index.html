<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>CHECKLIST SUPREME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Architects+Daughter&family=Archivo+Black&family=Bebas+Neue&family=Caveat:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Fraunces:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Inter:wght@400;700;900&family=Major+Mono+Display&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,900&family=Press+Start+2P&family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;700&family=Source+Sans+3:wght@400;700;900&family=Source+Serif+4:wght@400;700&family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&family=UnifrakturMaguntia&family=VT323&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CHECKLIST SUPREME — 5 wildly different theme worlds.
   Behavior cloned from Tubular Checklist. Designs are not.
   ============================================================ */
:root {
  --oxblood: #7a1f1a;
  --oxblood-deep: #2b1410;
  --persimmon: #ff5a1f;
  --persimmon-glow: #ff8c42;
  --acid: #b8ff3d;
  --violet: #8b3dff;
  --violet-deep: #3d1a6b;
  --magenta: #ff2d8a;
  --cream: #f4e4c1;
  --bone: #d4b896;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; overflow-x: hidden; }
body {
  min-height: 100vh;
  padding: 24px 16px 80px;
  line-height: 1.4;
  position: relative;
  color: var(--cream);
  transition: background-color 0.6s ease, color 0.6s ease;
}
.container { max-width: 100%; position: relative; z-index: 3; }
header { margin-bottom: 28px; padding: 18px 0 24px; text-align: center; position: relative; min-height: 340px; display: flex; flex-direction: column; justify-content: center; }
h1 { display: inline-block; }
h1 .word2 { display: block; }
.meta { margin-top: 16px; }
ul.checklist { list-style: none; }

/* ---------- shared animations ---------- */
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideOut {
  to { opacity: 0; transform: translateX(40px) scale(0.9); max-height: 0; padding-top: 0; padding-bottom: 0; margin-bottom: 0; border-width: 0; }
}
@keyframes preDetonate {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  10% { transform: translate(-3px, 2px) rotate(-1deg); }
  20% { transform: translate(3px, -2px) rotate(1deg); }
  30% { transform: translate(-4px, 0) rotate(-2deg); }
  40% { transform: translate(4px, 1px) rotate(2deg); }
  50% { transform: translate(-3px, -1px) rotate(-1deg); }
  60% { transform: translate(3px, 2px) rotate(1deg); }
  70% { transform: translate(-2px, -2px) rotate(-2deg); }
  80% { transform: translate(2px, 1px) rotate(1deg); }
  90% { transform: translate(-1px, 0) rotate(-1deg); }
}
@keyframes detonate {
  0%   { transform: scale(1); filter: brightness(1) saturate(1); opacity: 1; }
  15%  { transform: scale(1.15); filter: brightness(6.4) saturate(0) blur(0px); background: var(--cream) !important; opacity: 1; }
  30%  { transform: scale(1.3); filter: brightness(3.2) saturate(2) blur(2px); opacity: 0.9; }
  100% { transform: scale(0.3) rotate(15deg); filter: brightness(0) blur(20px); opacity: 0; }
}
@keyframes burst { 0% { transform: scale(0) rotate(0deg); opacity: 1; } 50% { opacity: 1; } 100% { transform: scale(3) rotate(180deg); opacity: 0; } }
@keyframes screenFlash { 0% { opacity: 0; } 10% { opacity: 0.8; } 100% { opacity: 0; } }
@keyframes modalBackdropIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalPanelIn {
  0%   { opacity: 0; transform: translateY(40px) scale(0.85) rotate(-2deg); filter: blur(12px); }
  60%  { opacity: 1; transform: translateY(-4px) scale(1.02) rotate(0.5deg); filter: blur(0); }
  100% { transform: translateY(0) scale(1) rotate(0deg); }
}
@keyframes victoryRise {
  0% { opacity: 0; transform: translateY(40px) scale(0.7); filter: blur(20px); }
  60% { opacity: 1; transform: translateY(0) scale(1.05); filter: blur(0); }
  100% { transform: translateY(0) scale(1); }
}
@keyframes victoryHueShift {
  0% { filter: hue-rotate(0deg) drop-shadow(0 0 40px var(--acid)); }
  50% { filter: hue-rotate(180deg) drop-shadow(0 0 60px var(--magenta)); }
  100% { filter: hue-rotate(360deg) drop-shadow(0 0 40px var(--acid)); }
}
@keyframes raySpin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
@keyframes confettiFall {
  0% { transform: translate3d(0, -100px, 0) rotate(0deg); opacity: 1; }
  100% { transform: translate3d(var(--drift, 0px), 110vh, 0) rotate(var(--spin, 720deg)); opacity: 1; }
}
@keyframes ringExpand { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(8); opacity: 0; } }
@keyframes pulse-acid {
  0%, 100% { box-shadow: 0 0 20px var(--acid), 0 0 40px var(--acid); }
  50% { box-shadow: 0 0 40px var(--acid), 0 0 80px var(--acid), 0 0 120px var(--acid); }
}

/* ---------- shared layout for items / buttons / modal / victory ---------- */
.item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 20px 14px 20px 22px;
  margin-bottom: 12px;
  min-height: 80px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
  max-height: 300px;
  animation: slideIn 0.5s ease-out backwards;
  transition: background 0.4s ease, border-color 0.4s ease, transform 0.2s ease;
}
.item:nth-child(1) { animation-delay: 0.04s; }
.item:nth-child(2) { animation-delay: 0.08s; }
.item:nth-child(3) { animation-delay: 0.12s; }
.item:nth-child(4) { animation-delay: 0.16s; }
.item:nth-child(5) { animation-delay: 0.20s; }
.item:nth-child(6) { animation-delay: 0.24s; }
.item:nth-child(7) { animation-delay: 0.28s; }
.item:nth-child(8) { animation-delay: 0.32s; }
.item:nth-child(n+9) { animation-delay: 0.36s; }
.item.removing { animation: slideOut 0.35s ease-in forwards; overflow: hidden; }
.item.shaking { animation: preDetonate 0.4s ease-in-out; }
.item.detonating { animation: detonate 0.6s ease-in forwards; pointer-events: none; }
.item:active { transform: scale(0.99); }

.checkbox {
  flex-shrink: 0; width: 32px; height: 32px;
  margin-top: 2px; position: relative;
  cursor: pointer; padding: 0; font: inherit; color: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.checkbox::after {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0) rotate(-180deg);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.item.done .checkbox::after { opacity: 1; transform: scale(1) rotate(0deg); }

.label {
  flex: 1; padding-top: 4px; padding-right: 36px;
  transition: all 0.4s ease;
}
.idx { position: absolute; top: 6px; right: 44px; letter-spacing: 1px; opacity: 0.5; }
.del-btn {
  position: absolute; top: 4px; right: 4px; width: 32px; height: 32px;
  background: transparent; cursor: pointer; padding: 0; line-height: 1;
  -webkit-tap-highlight-color: transparent; z-index: 5;
  transition: all 0.2s ease;
}

.action-row { margin-top: 36px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.action-btn {
  background: transparent; padding: 12px 22px;
  cursor: pointer; font-weight: bold;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.3s ease;
}

.burst { position: fixed; pointer-events: none; width: 60px; height: 60px; border-radius: 50%; animation: burst 0.6s ease-out forwards; z-index: 999; }
.empty { text-align: center; padding: 40px 20px; }

/* ---------- modal ---------- */
.add-modal {
  position: fixed; inset: 0; z-index: 9000;
  display: none; align-items: center; justify-content: center;
  padding: 24px;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: modalBackdropIn 0.3s ease-out;
}
.add-modal.active { display: flex; }
.add-panel {
  position: relative; width: 100%; max-width: 440px; padding: 28px 22px 22px;
  animation: modalPanelIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}
.add-modal-title { line-height: 1; margin-bottom: 4px; }
.add-modal-hint { margin-bottom: 18px; }
.add-textarea {
  width: 100%; min-height: 140px;
  padding: 14px 16px;
  resize: vertical; outline: none;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.add-modal-actions { margin-top: 16px; display: flex; gap: 10px; justify-content: flex-end; }
.modal-btn { background: transparent; padding: 12px 20px; cursor: pointer; font-weight: bold; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
.add-count { flex: 1; align-self: center; }

/* ---------- victory ---------- */
.shrapnel { position: fixed; pointer-events: none; width: 8px; height: 8px; z-index: 9000; will-change: transform, opacity; }
.screen-flash { position: fixed; inset: 0; background: var(--cream); z-index: 9500; pointer-events: none; opacity: 0; animation: screenFlash 0.8s ease-out forwards; mix-blend-mode: screen; }
.victory {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
.victory.active { opacity: 1; pointer-events: auto; }
.victory-svg { width: 100%; height: 100%; position: absolute; inset: 0; }
.victory-message { position: relative; z-index: 10; text-align: center; padding: 0 24px; }
.victory-title { line-height: 0.85; margin-bottom: 20px; }
.victory-subtitle { margin-bottom: 8px; }
.victory-dismiss { display: block; margin: 36px auto 0; padding: 14px 32px; cursor: pointer; -webkit-tap-highlight-color: transparent; font-weight: bold; transition: all 0.3s ease; background: transparent; animation: victoryRise 0.8s ease-out 1.2s backwards; }
.victory-rays { position: absolute; top: 50%; left: 50%; width: 200vmax; height: 200vmax; transform: translate(-50%, -50%); animation: raySpin 8s linear infinite; opacity: 0; transition: opacity 0.6s ease 0.3s; }
.victory.active .victory-rays { opacity: 0.6; }
.confetti { position: absolute; width: 12px; height: 12px; will-change: transform, opacity; }
.victory-ring { position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; border: 4px solid var(--acid); border-radius: 50%; animation: ringExpand 2.4s ease-out infinite; }
.victory-ring:nth-child(2) { animation-delay: 0.6s; border-color: var(--persimmon); }
.victory-ring:nth-child(3) { animation-delay: 1.2s; border-color: var(--magenta); }
.victory-ring:nth-child(4) { animation-delay: 1.8s; border-color: var(--violet); }

/* ============================================================
   THEME 1 · TUBULAR — glitch noir, oxblood & persimmon
   ============================================================ */
@keyframes bgshift {
  0%   { background-position: 0% 0%, 100% 100%, 50% 50%, 0% 100%; }
  25%  { background-position: 30% 20%, 70% 80%, 80% 20%, 20% 80%; }
  50%  { background-position: 100% 50%, 0% 50%, 20% 80%, 80% 20%; }
  75%  { background-position: 70% 80%, 30% 20%, 50% 50%, 50% 50%; }
  100% { background-position: 0% 0%, 100% 100%, 50% 50%, 0% 100%; }
}
@keyframes glitch {
  0%, 90%, 100% { transform: translate(0); }
  92% { transform: translate(-2px, 1px); }
  94% { transform: translate(2px, -1px); }
  96% { transform: translate(-1px, -1px); }
}
@keyframes tubularDrift {
  0%, 100% { filter: hue-rotate(0deg) saturate(1); }
  25%     { filter: hue-rotate(8deg) saturate(1.04); }
  50%     { filter: hue-rotate(-6deg) saturate(0.97); }
  75%     { filter: hue-rotate(10deg) saturate(1.03); }
}
body[data-theme="tubular"] {
  font-family: 'Georgia', serif;
  color: var(--cream);
  background-color: var(--oxblood-deep);
  background-image:
    radial-gradient(circle at 0% 0%, var(--oxblood) 0%, transparent 50%),
    radial-gradient(circle at 100% 100%, var(--violet-deep) 0%, transparent 55%),
    radial-gradient(circle at 50% 50%, var(--persimmon) 0%, transparent 45%),
    radial-gradient(circle at 0% 100%, var(--acid) 0%, transparent 50%);
  background-size: 200% 200%, 200% 200%, 200% 200%, 200% 200%;
  animation: bgshift 18s ease-in-out infinite, tubularDrift 90s ease-in-out infinite;
}
body[data-theme="tubular"]::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 2px),
    repeating-linear-gradient(90deg, rgba(255,90,31,0.02) 0px, rgba(255,90,31,0.02) 1px, transparent 1px, transparent 4px);
  mix-blend-mode: overlay;
}
body[data-theme="tubular"]::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 2;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
}
body[data-theme="tubular"] h1 {
  font-family: 'Georgia', serif;
  font-weight: 900; font-style: italic;
  font-size: 64px; line-height: 0.9; letter-spacing: -3px;
  color: var(--cream); text-transform: uppercase;
  animation: glitch 6s infinite;
  text-shadow: 3px 0 0 var(--persimmon), -3px 0 0 var(--acid), 0 0 30px rgba(255,90,31,0.6), 0 0 60px rgba(139,61,255,0.4);
}
body[data-theme="tubular"] h1 .word2 {
  font-size: 88px; margin-top: -8px;
  background: linear-gradient(180deg, var(--persimmon) 0%, var(--oxblood) 50%, var(--violet) 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 20px rgba(255,90,31,0.5)); text-shadow: none;
}
body[data-theme="tubular"] .meta { font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--bone); }
body[data-theme="tubular"] .count-badge { display: inline-block; padding: 6px 14px; background: var(--oxblood); color: var(--cream); border: 1px solid var(--persimmon); margin: 0 6px; box-shadow: 0 0 20px rgba(255,90,31,0.5), inset 0 0 10px rgba(0,0,0,0.4); transform: skewX(-8deg); transition: all 0.6s ease; }
body[data-theme="tubular"] .count-badge .count { color: var(--persimmon-glow); text-shadow: 0 0 8px var(--persimmon); }
body[data-theme="tubular"] .count-badge.complete { background: var(--acid); color: var(--oxblood-deep); border-color: var(--acid); animation: pulse-acid 1.2s ease-in-out infinite; }
body[data-theme="tubular"] .count-badge.complete .count { color: var(--oxblood-deep); text-shadow: none; }
body[data-theme="tubular"] .tagline { display: block; margin-top: 14px; opacity: 0.75; font-style: italic; }

body[data-theme="tubular"] .item {
  background: linear-gradient(135deg, rgba(122,31,26,0.4) 0%, rgba(43,20,16,0.6) 100%);
  border: 1px solid rgba(255,90,31,0.25);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
body[data-theme="tubular"] .item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
  background: linear-gradient(180deg, var(--magenta) 0%, var(--violet) 25%, var(--persimmon) 55%, var(--persimmon-glow) 75%, var(--acid) 100%);
  box-shadow: 0 0 12px rgba(255,45,138,0.5), inset 1px 0 0 rgba(255,255,255,0.1);
  transition: all 0.4s ease;
}
body[data-theme="tubular"] .checkbox {
  border: 2px solid var(--persimmon); background: var(--oxblood-deep);
  box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
  transform: rotate(-2deg);
}
body[data-theme="tubular"] .checkbox::after {
  content: '✕'; font-size: 22px; font-weight: 900; color: var(--oxblood-deep); font-family: 'Arial Black', sans-serif;
}
body[data-theme="tubular"] .item.done .checkbox {
  background: var(--acid); border-color: var(--acid); transform: rotate(5deg);
  box-shadow: 0 0 0 4px rgba(184,255,61,0.2), 0 0 24px var(--acid), 0 0 48px rgba(184,255,61,0.6);
}
body[data-theme="tubular"] .item.done { background: linear-gradient(135deg, rgba(184,255,61,0.05) 0%, rgba(43,20,16,0.4) 100%); border-color: rgba(184,255,61,0.3); }
body[data-theme="tubular"] .item.done::before { background: linear-gradient(180deg, var(--acid) 0%, var(--acid) 100%); box-shadow: 0 0 24px var(--acid), 0 0 48px rgba(184,255,61,0.5); }
body[data-theme="tubular"] .label { font-size: 17px; font-weight: 500; letter-spacing: -0.2px; line-height: 1.45; }
body[data-theme="tubular"] .item.done .label {
  color: var(--bone); text-decoration: line-through; text-decoration-color: var(--acid); text-decoration-thickness: 2px;
  opacity: 0.55; font-style: italic;
}
body[data-theme="tubular"] .idx { font-family: 'Courier New', monospace; font-size: 10px; color: var(--persimmon); }
body[data-theme="tubular"] .item.done .idx { color: var(--acid); }
body[data-theme="tubular"] .del-btn { border: 1px solid rgba(255,90,31,0.3); color: var(--persimmon); font-size: 16px; font-family: 'Arial Black', sans-serif; }
body[data-theme="tubular"] .del-btn:active { background: var(--magenta); color: var(--cream); border-color: var(--magenta); box-shadow: 0 0 16px var(--magenta); transform: scale(0.85); }
body[data-theme="tubular"] .action-btn { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--cream); }
body[data-theme="tubular"] .add-btn { border: 2px solid var(--acid); color: var(--acid); }
body[data-theme="tubular"] .add-btn:active { background: var(--acid); color: var(--oxblood-deep); transform: scale(0.95); box-shadow: 0 0 24px var(--acid); }
body[data-theme="tubular"] .palette-btn { border: 2px solid var(--violet); }
body[data-theme="tubular"] .palette-btn:active { background: var(--violet); transform: scale(0.95); box-shadow: 0 0 24px var(--violet); }
body[data-theme="tubular"] .empty { font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 2px; color: var(--bone); opacity: 0.5; text-transform: uppercase; }
body[data-theme="tubular"] .add-panel { background: linear-gradient(135deg, var(--oxblood) 0%, var(--oxblood-deep) 100%); border: 2px solid var(--persimmon); box-shadow: 0 0 40px rgba(255,90,31,0.4), 0 0 80px rgba(139,61,255,0.3), inset 0 0 20px rgba(0,0,0,0.4); }
body[data-theme="tubular"] .add-panel::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: linear-gradient(180deg, var(--magenta) 0%, var(--violet) 25%, var(--persimmon) 55%, var(--persimmon-glow) 75%, var(--acid) 100%); box-shadow: 0 0 12px var(--magenta); }
body[data-theme="tubular"] .add-panel::after { content: ''; position: absolute; top: -2px; right: -2px; width: 60px; height: 60px; background: linear-gradient(225deg, var(--acid) 0%, transparent 50%); opacity: 0.4; pointer-events: none; }
body[data-theme="tubular"] .add-modal-title { font-family: 'Georgia', serif; font-weight: 900; font-style: italic; font-size: 32px; color: var(--cream); text-transform: uppercase; letter-spacing: -1.5px; padding-left: 12px; text-shadow: 2px 0 0 var(--persimmon), -2px 0 0 var(--acid), 0 0 20px rgba(255,90,31,0.6); }
body[data-theme="tubular"] .add-modal-hint { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--persimmon-glow); padding-left: 12px; opacity: 0.8; }
body[data-theme="tubular"] .add-textarea { background: var(--oxblood-deep); border: 1px solid rgba(255,90,31,0.4); color: var(--cream); font-family: 'Georgia', serif; font-size: 16px; line-height: 1.5; }
body[data-theme="tubular"] .add-textarea:focus { border-color: var(--acid); box-shadow: 0 0 0 1px var(--acid), 0 0 24px rgba(184,255,61,0.3), inset 0 0 12px rgba(0,0,0,0.5); }
body[data-theme="tubular"] .add-textarea::placeholder { color: var(--bone); opacity: 0.4; font-style: italic; }
body[data-theme="tubular"] .modal-btn { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
body[data-theme="tubular"] .cancel-btn { border: 2px solid rgba(212,184,150,0.4); color: var(--bone); }
body[data-theme="tubular"] .cancel-btn:active { background: rgba(212,184,150,0.15); border-color: var(--bone); transform: scale(0.95); }
body[data-theme="tubular"] .commit-btn { border: 2px solid var(--acid); color: var(--acid); }
body[data-theme="tubular"] .commit-btn:active { background: var(--acid); color: var(--oxblood-deep); transform: scale(0.95); box-shadow: 0 0 24px var(--acid); }
body[data-theme="tubular"] .add-count { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--persimmon-glow); opacity: 0.7; }

body[data-theme="tubular"] .victory-title { font-family: 'Georgia', serif; font-weight: 900; font-style: italic; font-size: 80px; color: var(--cream); text-transform: uppercase; letter-spacing: -4px; animation: victoryRise 0.8s ease-out 0.6s backwards, victoryHueShift 3s ease-in-out 1.4s infinite; text-shadow: 4px 0 0 var(--persimmon), -4px 0 0 var(--acid), 0 0 40px var(--magenta); }

<script>
/* ============================================================ */
const STORAGE_KEY = 'checklist_supreme_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { items: [], paletteOffset: 0 };
    const data = JSON.parse(raw);
    if (!Array.isArray(data.items)) data.items = [];
    if (typeof data.paletteOffset !== 'number') data.paletteOffset = 0;
    return data;
  } catch (e) {
    return { items: [], paletteOffset: 0 };
  }
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) {}
}

let data = loadData();
let victoryActive = false;
let confettiInterval = null;

/* ============================================================
   THEMES — 5 wildly different worlds.
   Same JS palette slots as Tubular; each theme repurposes them
   for its detonation/confetti/victory color logic.
   ============================================================ */
const PALETTES = [
  { id:'tubular',
    oxblood:'#7a1f1a', deep:'#2b1410', persimmon:'#ff5a1f', persimmonGlow:'#ff8c42',
    acid:'#b8ff3d', violet:'#8b3dff', violetDeep:'#3d1a6b', magenta:'#ff2d8a',
    cream:'#f4e4c1', bone:'#d4b896' },

    oxblood:'#1a0033', deep:'#000000', persimmon:'#ff00ff', persimmonGlow:'#ff5fff',
    acid:'#00ffff', violet:'#ffff00', violetDeep:'#220044', magenta:'#ff0099',
    cream:'#ffffff', bone:'#aaaaaa' },
  { id:'buzzbin',

    acid:'#b8ff3d', violet:'#111111', violetDeep:'#000000', magenta:'#ff2d8a',
    cream:'#ffffff', bone:'#ffd200' },

    oxblood:'#c1a4ff', deep:'#7adfff', persimmon:'#ff6ec7', persimmonGlow:'#ff9ed8',
    acid:'#b8ff3d', violet:'#a98aff', violetDeep:'#5a2080', magenta:'#ff6ec7',
    cream:'#ffe4f0', bone:'#f7c6f7' },
  { id:'press',
    oxblood:'#c0282d', deep:'#f1ede2', persimmon:'#c0282d', persimmonGlow:'#e85055',
    acid:'#c0282d', violet:'#0a0a0a', violetDeep:'#0a0a0a', magenta:'#c0282d',
    cream:'#f1ede2', bone:'#0a0a0a' },
  { id:'matrix',
    oxblood:'#003311', deep:'#000000', persimmon:'#00ff41', persimmonGlow:'#88ff88',
    acid:'#39ff14', violet:'#00aa33', violetDeep:'#001a08', magenta:'#00ff88',
    cream:'#88ff88', bone:'#003311' },
  { id:'blueprint',
    oxblood:'#1a3a6e', deep:'#0d2138', persimmon:'#7cc4ff', persimmonGlow:'#aae3ff',
    acid:'#ffffff', violet:'#ff5050', violetDeep:'#1a2438', magenta:'#ff5050',
    cream:'#e8f3ff', bone:'#7cc4ff' },
  { id:'chalkboard',
    oxblood:'#1f4830', deep:'#0c2418', persimmon:'#ffeb6e', persimmonGlow:'#fff5b0',
    acid:'#fefdfa', violet:'#ffaad4', violetDeep:'#1f4830', magenta:'#ff8ec5',
    cream:'#fefdfa', bone:'#d8d4c8' },
  { id:'studio',
    oxblood:'#fa0f00', deep:'#fafafa', persimmon:'#fa0f00', persimmonGlow:'#ff4d3d',
    acid:'#1f1f1f', violet:'#6e6e6e', violetDeep:'#1f1f1f', magenta:'#fa0f00',
    cream:'#ffffff', bone:'#e1e1e1' },
];

function getCurrentPalette() {
  return PALETTES[data.paletteOffset % PALETTES.length];
}

function applyPalette(offset) {
  const p = PALETTES[offset % PALETTES.length];
  const root = document.documentElement.style;
  root.setProperty('--oxblood', p.oxblood);
  root.setProperty('--oxblood-deep', p.deep);
  root.setProperty('--persimmon', p.persimmon);
  root.setProperty('--persimmon-glow', p.persimmonGlow);
  root.setProperty('--acid', p.acid);
  root.setProperty('--violet', p.violet);
  root.setProperty('--violet-deep', p.violetDeep);
  root.setProperty('--magenta', p.magenta);
  root.setProperty('--cream', p.cream);
  root.setProperty('--bone', p.bone);
  document.body.dataset.theme = p.id;
}

applyPalette(data.paletteOffset);

/* ============================================================
   TAGLINE
   ============================================================ */
const TAGLINES = [
  'tap to obliterate', 'tap to ignite', 'tap to dissolve',
  'tap to banish', 'tap to scorch', 'tap to bury',
  'tap to silence', 'tap to evaporate', 'tap to dispatch',
  'tap to settle the score', 'tap to close the loop', 'tap to call it done',
  'tap to mark it gone', 'tap to send under', 'tap to erase from time',
  'tap to unmake', 'tap to retire it', 'tap to put it to bed',
  'tap to cross it off', 'tap to be rid of it'
];

const VICTORY_MESSAGES = [
  { title: 'COMPLETE',      sub: '// every task obliterated //' },
  { title: 'CRUSHED IT',    sub: '// the list is dead //' },
  { title: 'SCORCHED',      sub: '// ashes only //' },
  { title: 'ZEROED OUT',    sub: '// the inbox of the soul //' },

  { title: 'EXTINGUISHED',  sub: '// not a wick burning //' },
  { title: 'NEUTRALIZED',   sub: '// perimeter secure //' },
  { title: 'ECLIPSED',      sub: '// outshone every item //' },
  { title: 'BANISHED',      sub: '// to the realm of done //' },
  { title: 'EXECUTED',      sub: '// flawless, by the way //' },
  { title: 'DISPATCHED',    sub: '// every item, sent home //' },
  { title: 'ABSOLUTE ZERO', sub: '// not a single task survives //' },
  { title: 'NULL & VOID',   sub: '// the queue speaks no more //' },
  { title: "CHEF'S KISS",   sub: '// immaculate execution //' },
  { title: 'TUBULAR',       sub: '// gnarly, even //' },
  { title: 'LEGENDARY',     sub: '// they will tell stories //' },
  { title: 'PEAK FORM',     sub: '// executive function: maxed //' },
  { title: 'MIC DROP',      sub: '// walked off the stage //' },
  { title: 'TABULA RASA',   sub: '// the slate, perfectly bare //' },
  { title: 'TOTAL CLEAR',   sub: '// the radar, blank //' },
  { title: 'MASTERED',      sub: '// the prophecy is fulfilled //' },
  { title: 'BLANK SLATE',   sub: '// emptiness, but luxurious //' }
];

function dayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}

document.getElementById('tagline').textContent = '— ' + TAGLINES[dayOfYear() % TAGLINES.length] + ' —';

/* ============================================================
   RENDER
   ============================================================ */
const checklist = document.getElementById('checklist');
const countEl = document.getElementById('count');
const countBadge = document.getElementById('countBadge');

function render() {
  checklist.innerHTML = '';

  if (data.items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'list is empty — tap +add';
    checklist.appendChild(empty);
    updateCount();
    return;
  }

  data.items.forEach((item, index) => {
    const li = document.createElement('li');
    li.className = 'item' + (item.done ? ' done' : '');
    li.dataset.id = item.id;
    li.addEventListener('click', () => {
      toggleItem(item.id, li);
    });

    const idx = document.createElement('span');
    idx.className = 'idx';
    idx.textContent = String(index + 1).padStart(2, '0');
    li.appendChild(idx);

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '×';
    del.setAttribute('aria-label', 'delete');
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteItem(item.id, li);
    });
    li.appendChild(del);

    const box = document.createElement('button');
    box.className = 'checkbox';
    box.setAttribute('aria-label', 'toggle done');
    box.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleItem(item.id, li);
    });
    li.appendChild(box);

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = item.label;
    li.appendChild(label);

    checklist.appendChild(li);
  });

  updateCount();
}

function updateCount() {
  const done = data.items.filter(i => i.done).length;
  const total = data.items.length;
  countEl.textContent = done + ' / ' + total;
  if (done === total && total > 0) countBadge.classList.add('complete');
  else countBadge.classList.remove('complete');
}

function toggleItem(id, liEl) {
  if (victoryActive) return;
  const item = data.items.find(i => i.id === id);
  if (!item) return;
  const wasDone = item.done;
  item.done = !item.done;
  saveData(data);
  liEl.classList.toggle('done');
  if (!wasDone) spawnBurst(liEl);
  updateCount();

  const total = data.items.length;
  const done = data.items.filter(i => i.done).length;
  if (total > 0 && done === total && !wasDone) {
    setTimeout(triggerCompletion, 500);
  }
}

function deleteItem(id, liEl) {
  liEl.classList.add('removing');
  setTimeout(() => {
    data.items = data.items.filter(i => i.id !== id);
    saveData(data);
    render();
  }, 350);
}

function openAddModal() {
  if (victoryActive) dismissVictory();
  const modal = document.getElementById('addModal');
  const textarea = document.getElementById('addTextarea');
  textarea.value = '';
  updateAddCount();
  modal.classList.add('active');
  setTimeout(() => textarea.focus(), 100);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

function updateAddCount() {
  const textarea = document.getElementById('addTextarea');
  const lines = textarea.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const countEl = document.getElementById('addCount');
  if (lines.length === 0) {
    countEl.textContent = '0 lines';
  } else if (lines.length === 1) {
    countEl.textContent = '1 item';
  } else {
    countEl.textContent = lines.length + ' items';
  }
}

function commitAddModal() {
  const textarea = document.getElementById('addTextarea');
  const lines = textarea.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) {
    closeAddModal();
    return;
  }
  lines.forEach((line, i) => {
    const id = 'item_' + Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2, 7);
    data.items.push({ id, label: line, done: false });
  });
  saveData(data);
  render();
  closeAddModal();
}

function shiftPalette() {
  data.paletteOffset = (data.paletteOffset + 1) % PALETTES.length;
  saveData(data);
  applyPalette(data.paletteOffset);
}

function spawnBurst(item) {
  const rect = item.querySelector('.checkbox').getBoundingClientRect();
  const burst = document.createElement('div');
  burst.className = 'burst';
  burst.style.left = (rect.left + rect.width / 2 - 30) + 'px';
  burst.style.top = (rect.top + rect.height / 2 - 30) + 'px';
  const p = getCurrentPalette();
  burst.style.border = '3px solid ' + p.acid;
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 600);
}

/* ============================================================
   COMPLETION SEQUENCE
   ============================================================ */

function triggerCompletion() {
  if (victoryActive) return;
  victoryActive = true;

  const items = Array.from(document.querySelectorAll('.item'));
  if (items.length === 0) {
    showVictory();
    return;
  }

  const palette = getCurrentPalette();
  const colors = [palette.persimmon, palette.acid, palette.magenta, palette.violet, palette.persimmonGlow, palette.cream || '#f4e4c1'];

  items.forEach((item, i) => {
    const baseDelay = i * 180;

    setTimeout(() => {
      item.classList.add('shaking');
    }, baseDelay);

    setTimeout(() => {
      item.classList.remove('shaking');
      item.classList.add('detonating');
      detonateItem(item, colors);
    }, baseDelay + 400);
  });

  const finalDelay = (items.length - 1) * 180 + 400 + 700;
  setTimeout(showVictory, finalDelay);
}

function detonateItem(item, colors) {
  const rect = item.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const flash = document.createElement('div');
  flash.className = 'screen-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 800);

  const count = 40;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
    const velocity = 200 + Math.random() * 400;
    const dx = Math.cos(angle) * velocity;
    const dy = Math.sin(angle) * velocity - 100;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 4 + Math.random() * 12;
    const rotation = (Math.random() - 0.5) * 1440;
    const duration = 800 + Math.random() * 600;

    const shape = Math.random();
    const particle = document.createElement('div');
    particle.className = 'shrapnel';
    particle.style.left = cx + 'px';
    particle.style.top = cy + 'px';
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.background = color;
    particle.style.boxShadow = `0 0 ${size * 2}px ${color}`;

    if (shape < 0.33) {
      particle.style.borderRadius = '50%';
    } else if (shape < 0.66) {
      particle.style.borderRadius = '0';
      particle.style.transform = `rotate(${Math.random() * 360}deg)`;
    } else {
      particle.style.clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
    }

    document.body.appendChild(particle);

    particle.animate([
      { transform: `translate(0, 0) rotate(0deg) scale(1)`, opacity: 1 },
      { transform: `translate(${dx}px, ${dy + 300}px) rotate(${rotation}deg) scale(0.3)`, opacity: 0 }
    ], {
      duration: duration,
      easing: 'cubic-bezier(0.2, 0.6, 0.4, 1)',
      fill: 'forwards'
    });

    setTimeout(() => particle.remove(), duration);
  }
}

function showVictory() {
  const palette = getCurrentPalette();

  const rays = document.getElementById('victoryRays');
  rays.innerHTML = '';
  const raySvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  raySvg.setAttribute('viewBox', '-100 -100 200 200');
  raySvg.style.width = '100%';
  raySvg.style.height = '100%';
  const rayColors = [palette.persimmon, palette.acid, palette.magenta, palette.violet, palette.persimmonGlow];
  const rayCount = 40;
  for (let i = 0; i < rayCount; i++) {
    const angle = (360 / rayCount) * i;
    const wedge = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const halfWidth = 360 / rayCount / 2 * 0.6;
    const a1 = (angle - halfWidth) * Math.PI / 180;
    const a2 = (angle + halfWidth) * Math.PI / 180;
    const r = 200;
    const x1 = Math.cos(a1) * r;
    const y1 = Math.sin(a1) * r;
    const x2 = Math.cos(a2) * r;
    const y2 = Math.sin(a2) * r;
    wedge.setAttribute('d', `M 0 0 L ${x1} ${y1} L ${x2} ${y2} Z`);
    wedge.setAttribute('fill', rayColors[i % rayColors.length]);
    wedge.setAttribute('opacity', '0.5');
    raySvg.appendChild(wedge);
  }
  rays.appendChild(raySvg);

  const msg = VICTORY_MESSAGES[Math.floor(Math.random() * VICTORY_MESSAGES.length)];
  document.getElementById('victoryTitle').textContent = msg.title;
  document.getElementById('victorySubtitle').textContent = msg.sub;

  const overlay = document.getElementById('victory');
  overlay.classList.add('active');

  startConfetti();
}

function startConfetti() {
  const overlay = document.getElementById('victory');
  const palette = getCurrentPalette();
  const colors = [palette.persimmon, palette.acid, palette.magenta, palette.violet, palette.persimmonGlow];

  confettiInterval = setInterval(() => {
    if (!victoryActive) return;
    const piece = document.createElement('div');
    piece.className = 'confetti';
    const size = 6 + Math.random() * 14;
    const color = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = (Math.random() * 100) + '%';
    piece.style.top = '-20px';
    piece.style.width = size + 'px';
    piece.style.height = (size * (0.5 + Math.random())) + 'px';
    piece.style.background = color;
    piece.style.boxShadow = `0 0 ${size}px ${color}`;
    if (Math.random() > 0.5) piece.style.borderRadius = '50%';

    const drift = (Math.random() - 0.5) * 200;
    const spin = 360 + Math.random() * 1080;
    const duration = 2500 + Math.random() * 2000;
    piece.style.setProperty('--drift', drift + 'px');
    piece.style.setProperty('--spin', spin + 'deg');
    piece.style.animation = `confettiFall ${duration}ms linear forwards`;

    overlay.appendChild(piece);
    setTimeout(() => piece.remove(), duration);
  }, 60);
}

function dismissVictory() {
  victoryActive = false;
  if (confettiInterval) {
    clearInterval(confettiInterval);
    confettiInterval = null;
  }
  document.getElementById('victory').classList.remove('active');

  setTimeout(() => {
    document.querySelectorAll('.confetti').forEach(c => c.remove());
  }, 500);

  data.items = [];
  saveData(data);
  render();
}

document.getElementById('addBtn').addEventListener('click', openAddModal);
document.getElementById('paletteBtn').addEventListener('click', shiftPalette);
document.getElementById('victoryDismiss').addEventListener('click', dismissVictory);

document.getElementById('addCommit').addEventListener('click', commitAddModal);
document.getElementById('addCancel').addEventListener('click', closeAddModal);
document.getElementById('addTextarea').addEventListener('input', updateAddCount);

document.getElementById('addTextarea').addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    commitAddModal();
  } else if (e.key === 'Escape') {
    closeAddModal();
  }
});

document.getElementById('addModal').addEventListener('click', (e) => {
  if (e.target.id === 'addModal') closeAddModal();
});

document.getElementById('victory').addEventListener('click', (e) => {
  if (e.target.id === 'victory' || e.target.classList.contains('victory-svg')) {
    dismissVictory();
  }
});

render();

const initDone = data.items.filter(i => i.done).length;
if (data.items.length > 0 && initDone === data.items.length) {
  setTimeout(triggerCompletion, 800);
}
</script>
